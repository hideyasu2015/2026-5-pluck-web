<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-cream-silk);padding:22px 26px;font-family:var(--font-sans)}
  .lab{font-size:10px;text-transform:uppercase;letter-spacing:.18em;color:var(--fg3);margin:0 0 14px}
  .row{display:flex;gap:18px;align-items:flex-end}
  .item{text-align:center}
  .box{background:var(--color-matcha-deep);width:74px;height:74px;margin-bottom:8px}
  .r-md{border-radius:6px}.r-xl{border-radius:12px}.r-2xl{border-radius:16px}.r-3xl{border-radius:24px}
  .r-pill{border-radius:9999px}
  .petal{border-top-left-radius:40px;border-bottom-right-radius:40px;border-top-right-radius:8px;border-bottom-left-radius:8px}
  .nm{font-size:11px;font-weight:600;color:var(--color-charcoal-ink)}
  .vl{font-size:10px;color:var(--fg3);font-family:var(--font-mono,monospace)}
</style></head>
<body>
  <p class="lab">Corner radii</p>
  <div class="row">
    <div class="item"><div class="box r-md"></div><div class="nm">md</div><div class="vl">6px</div></div>
    <div class="item"><div class="box r-xl"></div><div class="nm">xl</div><div class="vl">12px</div></div>
    <div class="item"><div class="box r-2xl"></div><div class="nm">2xl · card</div><div class="vl">16px</div></div>
    <div class="item"><div class="box r-3xl"></div><div class="nm">3xl · feature</div><div class="vl">24px</div></div>
    <div class="item"><div class="box r-pill"></div><div class="nm">pill · button</div><div class="vl">9999px</div></div>
    <div class="item"><div class="box petal"></div><div class="nm">petal</div><div class="vl">asymmetric</div></div>
  </div>
</body></html>
