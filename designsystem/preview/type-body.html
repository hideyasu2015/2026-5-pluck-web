<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-cream-silk);padding:22px 26px;font-family:var(--font-sans)}
  .eye{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--fg3);margin:0 0 10px}
  .lead{font-size:17px;font-weight:300;line-height:1.62;color:var(--fg2);margin:0;max-width:600px}
  .scale{display:flex;gap:18px;margin-top:16px;align-items:baseline;flex-wrap:wrap}
  .scale span{color:var(--color-charcoal-ink)}
  .w3{font-weight:300}.w4{font-weight:400}.w5{font-weight:500}.w6{font-weight:600}.w7{font-weight:700}
  .tag{font-size:10px;color:var(--fg3);display:block;font-weight:400;margin-top:2px}
</style></head>
<body>
  <p class="eye">Body / UI · Inter</p>
  <p class="lead">We are not tea farmers — and that is precisely why we are not bound by one region's habits or supply constraints. We can stay neutral and ask what is best for each client.</p>
  <div class="scale">
    <span class="w3" style="font-size:18px">Light<span class="tag">300 · body</span></span>
    <span class="w4" style="font-size:18px">Regular<span class="tag">400</span></span>
    <span class="w5" style="font-size:18px">Medium<span class="tag">500 · meta</span></span>
    <span class="w6" style="font-size:18px">Semibold<span class="tag">600 · eyebrow</span></span>
    <span class="w7" style="font-size:18px">Bold<span class="tag">700 · divider caps</span></span>
  </div>
</body></html>
