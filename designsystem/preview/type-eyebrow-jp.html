<!-- @dsCard group="Type" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;500;600&family=Noto+Serif+JP:wght@600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--color-cream-silk);padding:24px 26px;font-family:var(--font-sans);display:flex;gap:30px;align-items:center}
  .col{flex:1}
  .eye{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--color-gold-champagne);margin:0 0 8px}
  .head{font-family:var(--font-serif);font-size:26px;font-weight:500;color:var(--color-matcha-deep);margin:0}
  .jp{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:600;color:var(--color-matcha-deep);margin:14px 0 0;line-height:1.5}
  .divider{width:48px;height:1px;background:color-mix(in oklab,var(--color-gold-champagne) 50%,transparent);margin:14px 0}
  .lock{display:flex;flex-direction:column;align-items:center;gap:6px}
  .brand{font-family:var(--font-serif);font-weight:500;letter-spacing:.1em;font-size:40px;color:var(--color-matcha-deep);line-height:1}
  .tok{font-family:var(--font-serif);letter-spacing:.38em;text-transform:uppercase;font-size:13px;color:var(--color-matcha-soft)}
  .ln{width:60px;height:1px;background:color-mix(in oklab,var(--color-matcha-deep) 30%,transparent)}
</style></head>
<body>
  <div class="col">
    <p class="eye">Name Origin</p>
    <h3 class="head">Origin of PLUCK</h3>
    <div class="divider"></div>
    <p class="jp">#01：本質を、まっすぐに。</p>
  </div>
  <div class="col"><div class="lock">
    <div class="brand">PLUCK</div>
    <div class="ln"></div>
    <div class="tok">Tokyo</div>
  </div></div>
</body></html>
