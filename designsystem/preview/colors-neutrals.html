<!-- @dsCard group="Colors" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--color-cream-silk);padding:22px}
  .row{display:flex;gap:14px}
  .sw{flex:1;border-radius:var(--radius-2xl);padding:14px;display:flex;flex-direction:column;justify-content:flex-end;height:104px;box-shadow:var(--shadow-sm)}
  .name{font-size:13px;font-weight:600}
  .hex{font-size:11px;font-family:var(--font-mono,monospace);opacity:.8;margin-top:2px;font-variant-numeric:tabular-nums}
  .role{font-size:10px;opacity:.65;margin-top:5px;text-transform:uppercase;letter-spacing:.12em}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-cream-silk);color:var(--color-charcoal-ink);border:1px solid var(--border)">
      <div class="name">Cream Silk</div><div class="hex">#F6F1E6</div>
      <div class="role">Page paper</div>
    </div>
    <div class="sw" style="background:var(--color-pearl-white);color:var(--color-charcoal-ink);border:1px solid var(--border)">
      <div class="name">Pearl White</div><div class="hex">#FBFAF7</div>
      <div class="role">Card inset</div>
    </div>
    <div class="sw" style="background:var(--color-charcoal-light);color:#fff">
      <div class="name">Charcoal Light</div><div class="hex">#2A2D2C</div>
      <div class="role">Body text</div>
    </div>
    <div class="sw" style="background:var(--color-charcoal-ink);color:#fff">
      <div class="name">Charcoal Ink</div><div class="hex">#111312</div>
      <div class="role">Primary text</div>
    </div>
    <div class="sw" style="background:var(--color-gold-champagne);color:#3a2f15">
      <div class="name">Gold Champagne</div><div class="hex">#C7A76C</div>
      <div class="role">Accent only</div>
    </div>
  </div>
</body></html>
