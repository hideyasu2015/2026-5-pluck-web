<!-- @dsCard group="Components" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--color-matcha-deep);padding:24px;position:relative}
  /* grain */
  body::before{content:"";position:absolute;inset:0;opacity:.10;mix-blend-mode:overlay;pointer-events:none;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
  .panel{position:relative;background:color-mix(in oklab,#fff 5%,transparent);backdrop-filter:blur(12px);border:1px solid color-mix(in oklab,#fff 10%,transparent);border-radius:16px;padding:26px;text-align:center;max-width:460px;margin:0 auto}
  .h{font-family:var(--font-serif);font-size:24px;color:var(--color-cream-silk);margin:0 0 10px}
  .p{font-weight:300;font-size:13px;line-height:1.6;color:color-mix(in oklab,var(--color-cream-silk) 80%,transparent);margin:0 0 18px;white-space:pre-line}
  .cta{display:block;background:var(--color-cream-silk);color:var(--color-matcha-deep);border-radius:9999px;padding:13px;font-weight:600;font-size:13px;letter-spacing:.02em}
</style></head>
<body>
  <div class="panel">
    <h3 class="h">Let's get started</h3>
    <p class="p">Your first sample is complimentary.
Wholesale, OEM, bulk supply, and more —
please reach out at your convenience.</p>
    <span class="cta">info@pluck.co.jp</span>
  </div>
</body></html>
