<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Inter:wght@300;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{font-family:var(--font-sans);background:var(--color-cream-silk);padding:26px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .eye{font-size:13px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--color-gold-champagne);margin:0 0 14px}
  .h{font-family:var(--font-serif);font-size:34px;font-weight:500;color:var(--color-matcha-deep);margin:0;line-height:1.25}
  .p{font-weight:300;font-size:15px;color:var(--fg2);max-width:440px;margin:14px 0 0;line-height:1.6}
  .rule{width:48px;height:1px;background:color-mix(in oklab,var(--color-gold-champagne) 50%,transparent);margin:18px 0 0}
</style></head>
<body>
  <p class="eye">Global Supply Chain</p>
  <h2 class="h">From Japan to the World,<br>Trusted Quality, Delivered.</h2>
  <p class="p">Leveraging production networks across Japan, we maintain a stable and reliable supply system.</p>
  <div class="rule"></div>
